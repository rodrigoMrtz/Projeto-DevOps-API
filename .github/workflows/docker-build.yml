name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Dispara sempre que houver um push na main
  pull_request:
    branches: [ "main" ] # Dispara se alguém tentar abrir um pull request para a main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código atual do repositório
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Faz login no Docker Hub usando os segredos criados
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Configura o Buildx (mecanismo moderno do Docker para builds eficientes)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Compila o Dockerfile e envia para o Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Tags criadas: 'latest' para o contêiner atualizado e uma tag com o ID do commit
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/minha-api-devops:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/minha-api-devops:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Trabalho de Deploy Automatizado (CD) que roda APÓS o build terminar com sucesso
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Só roda se o build passar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Passo 1: Copia o docker-compose.yml atualizado do Git para o servidor AWS
      - name: Copy docker-compose.yml to AWS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_INSTANCE_IP }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/app/"

      # Passo 2: Conecta via SSH na AWS e atualiza os containers
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_INSTANCE_IP }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            cd /home/ubuntu/app/
            # Baixa a nova imagem que o job anterior acabou de subir no Docker Hub
            docker compose pull
            # Reinicia apenas o que mudou (web-api) sem derrubar o banco de dados
            docker compose up -d